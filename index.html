const express = require('express');
const mongoose = require('mongoose');
const cors = require('cors');
const bcrypt = require('bcryptjs');
const jwt = require('jsonwebtoken');
require('dotenv').config();

const app = express();
app.use(cors());
app.use(express.json());

mongoose.connect(process.env.MONGO_URI || 'mongodb://localhost:27017/hospital');

const PatientSchema = new mongoose.Schema({
  name: String, age: Number, gender: String, phone: String, email: String,
  address: String, medicalHistory: [{ condition: String, date: Date, notes: String }],
  createdAt: { type: Date, default: Date.now }
});
const Patient = mongoose.model('Patient', PatientSchema);

const DoctorSchema = new mongoose.Schema({
  name: String, specialization: String, phone: String, email: String,
  schedule: [{ day: String, startTime: String, endTime: String }],
  available: { type: Boolean, default: true }
});
const Doctor = mongoose.model('Doctor', DoctorSchema);

const AppointmentSchema = new mongoose.Schema({
  patient: { type: mongoose.Schema.Types.ObjectId, ref: 'Patient' },
  doctor: { type: mongoose.Schema.Types.ObjectId, ref: 'Doctor' },
  date: Date, time: String, status: { type: String, default: 'scheduled' },
  notes: String
});

const BillingSchema = new mongoose.Schema({
  patient: { type: mongoose.Schema.Types.ObjectId, ref: 'Patient' },
  appointment: { type: mongoose.Schema.Types.ObjectId, ref: 'Appointment' },
  amount: Number, description: String, status: { type: String, default: 'pending' },
  date: { type: Date, default: Date.now }
});
const Billing = mongoose.model('Billing', BillingSchema);

const UserSchema = new mongoose.Schema({
  username: String, password: String, role: { type: String, default: 'staff' }
});

const auth = (req, res, next) => {
  try {
    const token = req.headers.authorization.split(' ')[1];
    req.user = jwt.verify(token, process.env.JWT_SECRET || 'secret');
    next();
  } catch(e) { res.status(401).json({ error: 'Unauthorized' }); }
};

app.post('/api/register', async (req, res) => {
  const hash = await bcrypt.hash(req.body.password, 10);
  const user = await User.create({ ...req.body, password: hash });

});

app.delete('/api/patients/:id', async (req, res) => { await Patient.findByIdAndDelete(req.params.id); res.json({ msg: 'Deleted' }); });

app.post('/api/patients/:id/records', async (req, res) => {

});

import React, { useState, useEffect } from 'react';
import axios from 'axios';
const API = 'http://localhost:5000/api';

function Login({ onLogin }) {
  const [form, setForm] = useState({ username: '', password: '' });
  const handle = async (e) => {
    e.preventDefault();
    const { data } = await axios.post(\`\${API}/login\`, form);
    localStorage.setItem('token', data.token);
    onLogin(data.user);
  };
  return (<form onSubmit={handle}>
    <h2>Login</h2>
    <input placeholder="Username" onChange={e => setForm({...form, username: e.target.value})} />
    <input type="password" placeholder="Password" onChange={e => setForm({...form, password: e.target.value})} />
    <button type="submit">Login</button>
  </form>);
}

function Patients() {
  const [patients, setPatients] = useState([]);
  const [form, setForm] = useState({ name: '', age: '', gender: '', phone: '', email: '', address: '' });
  useEffect(() => { fetchPatients(); }, []);
  const fetchPatients = async () => { const { data } = await axios.get(\`\${API}/patients\`); setPatients(data); };
  const addPatient = async (e) => { e.preventDefault(); await axios.post(\`\${API}/patients\`, form); setForm({ name: '', age: '', gender: '', phone: '', email: '', address: '' }); fetchPatients(); };
  const deletePatient = async (id) => { await axios.delete(\`\${API}/patients/\${id}\`); fetchPatients(); };
  return (<div>
    <h2>Patients</h2>
    <form onSubmit={addPatient}>
      <input placeholder="Name" value={form.name} onChange={e => setForm({...form, name: e.target.value})} />
      <input placeholder="Age" type="number" value={form.age} onChange={e => setForm({...form, age: e.target.value})} />
      <select value={form.gender} onChange={e => setForm({...form, gender: e.target.value})}><option value="">Gender</option><option>Male</option><option>Female</option></select>
      <input placeholder="Phone" value={form.phone} onChange={e => setForm({...form, phone: e.target.value})} />
      <input placeholder="Email" value={form.email} onChange={e => setForm({...form, email: e.target.value})} />
      <button type="submit">Add Patient</button>
    </form>
    <table><thead><tr><th>Name</th><th>Age</th><th>Gender</th><th>Phone</th><th>Actions</th></tr></thead>
    <tbody>{patients.map(p => <tr key={p._id}><td>{p.name}</td><td>{p.age}</td><td>{p.gender}</td><td>{p.phone}</td><td><button onClick={() => deletePatient(p._id)}>Delete</button></td></tr>)}</tbody></table>
  </div>);
}

function Doctors() {
  const [doctors, setDoctors] = useState([]);
  const [form, setForm] = useState({ name: '', specialization: '', phone: '', email: '' });
  useEffect(() => { fetchDoctors(); }, []);
  const fetchDoctors = async () => { const { data } = await axios.get(\`\${API}/doctors\`); setDoctors(data); };
  const addDoctor = async (e) => { e.preventDefault(); await axios.post(\`\${API}/doctors\`, form); setForm({ name: '', specialization: '', phone: '', email: '' }); fetchDoctors(); };
  const deleteDoctor = async (id) => { await axios.delete(\`\${API}/doctors/\${id}\`); fetchDoctors(); };
  return (<div>
    <h2>Doctors</h2>
    <form onSubmit={addDoctor}>
      <input placeholder="Name" value={form.name} onChange={e => setForm({...form, name: e.target.value})} />
      <input placeholder="Specialization" value={form.specialization} onChange={e => setForm({...form, specialization: e.target.value})} />
      <input placeholder="Phone" value={form.phone} onChange={e => setForm({...form, phone: e.target.value})} />
      <button type="submit">Add Doctor</button>
    </form>
    <table><thead><tr><th>Name</th><th>Specialization</th><th>Phone</th><th>Actions</th></tr></thead>
    <tbody>{doctors.map(d => <tr key={d._id}><td>{d.name}</td><td>{d.specialization}</td><td>{d.phone}</td><td><button onClick={() => deleteDoctor(d._id)}>Delete</button></td></tr>)}</tbody></table>
  </div>);
}

function Appointments() {
  const [appts, setAppts] = useState([]);
  const [patients, setPatients] = useState([]);
  const [doctors, setDoctors] = useState([]);
  const [form, setForm] = useState({ patient: '', doctor: '', date: '', time: '', notes: '' });
  useEffect(() => { fetchAll(); }, []);
  const fetchAll = async () => {
    const [a, p, d] = await Promise.all([axios.get(\`\${API}/appointments\`), axios.get(\`\${API}/patients\`), axios.get(\`\${API}/doctors\`)]);
    setAppts(a.data); setPatients(p.data); setDoctors(d.data);
  };
  const addAppt = async (e) => { e.preventDefault(); await axios.post(\`\${API}/appointments\`, form); fetchAll(); };
  return (<div>
    <h2>Appointments</h2>
    <form onSubmit={addAppt}>
      <select onChange={e => setForm({...form, patient: e.target.value})}><option value="">Select Patient</option>{patients.map(p => <option key={p._id} value={p._id}>{p.name}</option>)}</select>
      <select onChange={e => setForm({...form, doctor: e.target.value})}><option value="">Select Doctor</option>{doctors.map(d => <option key={d._id} value={d._id}>{d.name}</option>)}</select>
      <input type="date" onChange={e => setForm({...form, date: e.target.value})} />
      <input type="time" onChange={e => setForm({...form, time: e.target.value})} />
      <button type="submit">Book</button>
    </form>
    <table><thead><tr><th>Patient</th><th>Doctor</th><th>Date</th><th>Status</th></tr></thead>
    <tbody>{appts.map(a => <tr key={a._id}><td>{a.patient?.name}</td><td>{a.doctor?.name}</td><td>{new Date(a.date).toLocaleDateString()}</td><td>{a.status}</td></tr>)}</tbody></table>
  </div>);
}

function BillingComp() {
  const [bills, setBills] = useState([]);
  const [patients, setPatients] = useState([]);
  const [form, setForm] = useState({ patient: '', amount: '', description: '' });
  useEffect(() => { fetchAll(); }, []);
  const fetchAll = async () => {
    const [b, p] = await Promise.all([axios.get(\`\${API}/billing\`), axios.get(\`\${API}/patients\`)]);
    setBills(b.data); setPatients(p.data);
  };
  const addBill = async (e) => { e.preventDefault(); await axios.post(\`\${API}/billing\`, form); fetchAll(); };
  return (<div>
    <h2>Billing</h2>
    <form onSubmit={addBill}>
      <select onChange={e => setForm({...form, patient: e.target.value})}><option value="">Select Patient</option>{patients.map(p => <option key={p._id} value={p._id}>{p.name}</option>)}</select>
      <input type="number" placeholder="Amount" onChange={e => setForm({...form, amount: e.target.value})} />
      <input placeholder="Description" onChange={e => setForm({...form, description: e.target.value})} />
      <button type="submit">Add Bill</button>
    </form>
    <table><thead><tr><th>Patient</th><th>Amount</th><th>Description</th><th>Status</th></tr></thead>
    <tbody>{bills.map(b => <tr key={b._id}><td>{b.patient?.name}</td><td>Rs.{b.amount}</td><td>{b.description}</td><td>{b.status}</td></tr>)}</tbody></table>
  </div>);
}

export default function App() {
  const [user, setUser] = useState(null);
  const [page, setPage] = useState('patients');
  if (!user) return <Login onLogin={setUser} />;
  return (<div>
    <nav><button onClick={() => setPage('patients')}>Patients</button><button onClick={() => setPage('doctors')}>Doctors</button><button onClick={() => setPage('appointments')}>Appointments</button><button onClick={() => setPage('billing')}>Billing</button><button onClick={() => { localStorage.removeItem('token'); setUser(null); }}>Logout</button></nav>
    {page === 'patients' && <Patients />}
    {page === 'doctors' && <Doctors />}
    {page === 'appointments' && <Appointments />}
    {page === 'billing' && <BillingComp />}
  </div>);
}

const express = require('express');
const mongoose = require('mongoose');
const cors = require('cors');
require('dotenv').config();

const app = express();
app.use(cors());
app.use(express.json());

mongoose.connect(process.env.MONGO_URI || 'mongodb://localhost:27017/restaurant');

const MenuItemSchema = new mongoose.Schema({
  name: String, description: String, price: Number, category: String,
  image: String, available: { type: Boolean, default: true }
});
const MenuItem = mongoose.model('MenuItem', MenuItemSchema);

const OrderSchema = new mongoose.Schema({
  items: [{ menuItem: { type: mongoose.Schema.Types.ObjectId, ref: 'MenuItem' }, name: String, price: Number, quantity: Number }],
  totalAmount: Number, customerName: String, customerPhone: String, customerAddress: String,
  status: { type: String, default: 'placed', enum: ['placed', 'preparing', 'out-for-delivery', 'delivered'] },
  createdAt: { type: Date, default: Date.now }
});
const Order = mongoose.model('Order', OrderSchema);

app.get('/api/menu', async (req, res) => {
  const { category } = req.query;
  const filter = category ? { category } : {};
  res.json(await MenuItem.find(filter));
});
app.post('/api/menu', async (req, res) => res.json(await MenuItem.create(req.body)));
app.put('/api/menu/:id', async (req, res) => res.json(await MenuItem.findByIdAndUpdate(req.params.id, req.body, { new: true })));
app.delete('/api/menu/:id', async (req, res) => { await MenuItem.findByIdAndDelete(req.params.id); res.json({ msg: 'Deleted' }); });

app.get('/api/orders', async (req, res) => res.json(await Order.find().sort({ createdAt: -1 })));
app.post('/api/orders', async (req, res) => {
  const { items, customerName, customerPhone, customerAddress } = req.body;
  const totalAmount = items.reduce((sum, i) => sum + i.price * i.quantity, 0);
  res.json(await Order.create({ items, totalAmount, customerName, customerPhone, customerAddress }));
});
app.put('/api/orders/:id/status', async (req, res) => {
  res.json(await Order.findByIdAndUpdate(req.params.id, { status: req.body.status }, { new: true }));
});
app.get('/api/track/:id', async (req, res) => {
  const order = await Order.findById(req.params.id);
  if (!order) return res.status(404).json({ error: 'Not found' });
  res.json({ status: order.status, items: order.items, total: order.totalAmount });
});

app.listen(5000, () => console.log('Server running on port 5000'));

import React, { useState, useEffect } from 'react';
import axios from 'axios';
const API = 'http://localhost:5000/api';

function Menu({ cart, setCart }) {
  const [items, setItems] = useState([]);
  const [category, setCategory] = useState('');
  useEffect(() => { axios.get(\`\${API}/menu\${category ? '?category=' + category : ''}\`).then(r => setItems(r.data)); }, [category]);
  const addToCart = (item) => {
    const exists = cart.find(c => c._id === item._id);
    if (exists) setCart(cart.map(c => c._id === item._id ? { ...c, quantity: c.quantity + 1 } : c));
    else setCart([...cart, { ...item, quantity: 1 }]);
  };
  return (<div>
    <h2>Menu</h2>
    <div><button onClick={() => setCategory('')}>All</button><button onClick={() => setCategory('starters')}>Starters</button><button onClick={() => setCategory('mains')}>Mains</button><button onClick={() => setCategory('desserts')}>Desserts</button><button onClick={() => setCategory('drinks')}>Drinks</button></div>
    {items.map(item => <div key={item._id} style={{border:'1px solid #ccc',padding:8,margin:4}}>
      <h3>{item.name}</h3><p>{item.description}</p><p>Rs.{item.price}</p>
      <button onClick={() => addToCart(item)}>Add to Cart</button>
    </div>)}
  </div>);
}

function Cart({ cart, setCart, setPage }) {
  const [form, setForm] = useState({ customerName: '', customerPhone: '', customerAddress: '' });
  const total = cart.reduce((s, i) => s + i.price * i.quantity, 0);
  const removeItem = (id) => setCart(cart.filter(c => c._id !== id));
  const updateQty = (id, qty) => { if (qty < 1) return removeItem(id); setCart(cart.map(c => c._id === id ? { ...c, quantity: qty } : c)); };
  const placeOrder = async () => {
    const items = cart.map(c => ({ menuItem: c._id, name: c.name, price: c.price, quantity: c.quantity }));
    await axios.post(\`\${API}/orders\`, { items, ...form });
    setCart([]); alert('Order placed!'); setPage('track');
  };
  return (<div>
    <h2>Cart</h2>
    {cart.length === 0 ? <p>Empty</p> : <>
      {cart.map(c => <div key={c._id}>{c.name} x {c.quantity} = Rs.{c.price * c.quantity} <button onClick={() => updateQty(c._id, c.quantity - 1)}>-</button><button onClick={() => updateQty(c._id, c.quantity + 1)}>+</button><button onClick={() => removeItem(c._id)}>Remove</button></div>)}
      <p><strong>Total: Rs.{total}</strong></p>
      <input placeholder="Name" onChange={e => setForm({...form, customerName: e.target.value})} />
      <input placeholder="Phone" onChange={e => setForm({...form, customerPhone: e.target.value})} />
      <input placeholder="Address" onChange={e => setForm({...form, customerAddress: e.target.value})} />
      <button onClick={placeOrder}>Place Order</button>
    </>}
  </div>);
}

function TrackOrder() {
  const [orderId, setOrderId] = useState('');
  const [order, setOrder] = useState(null);
  const track = async () => { const { data } = await axios.get(\`\${API}/track/\${orderId}\`); setOrder(data); };
  return (<div><h2>Track Order</h2>
    <input placeholder="Order ID" value={orderId} onChange={e => setOrderId(e.target.value)} />
    <button onClick={track}>Track</button>
    {order && <div><p>Status: <strong>{order.status}</strong></p><p>Total: Rs.{order.total}</p></div>}
  </div>);
}

function AdminOrders() {
  const [orders, setOrders] = useState([]);
  useEffect(() => { fetchOrders(); }, []);
  const fetchOrders = async () => { const { data } = await axios.get(\`\${API}/orders\`); setOrders(data); };
  const updateStatus = async (id, status) => { await axios.put(\`\${API}/orders/\${id}/status\`, { status }); fetchOrders(); };
  return (<div><h2>Orders</h2>
    {orders.map(o => <div key={o._id} style={{border:'1px solid #ccc',padding:8,margin:4}}>
      <p>{o._id} | {o.customerName} | Rs.{o.totalAmount} | {o.status}</p>
      <select value={o.status} onChange={e => updateStatus(o._id, e.target.value)}>
        <option value="placed">Placed</option><option value="preparing">Preparing</option><option value="out-for-delivery">Out for Delivery</option><option value="delivered">Delivered</option>
      </select>
    </div>)}
  </div>);
}

export default function App() {
  const [page, setPage] = useState('menu');
  const [cart, setCart] = useState([]);
  return (<div>
    <nav><button onClick={() => setPage('menu')}>Menu</button><button onClick={() => setPage('cart')}>Cart ({cart.length})</button><button onClick={() => setPage('track')}>Track</button><button onClick={() => setPage('admin')}>Admin</button></nav>
    {page === 'menu' && <Menu cart={cart} setCart={setCart} />}
    {page === 'cart' && <Cart cart={cart} setCart={setCart} setPage={setPage} />}
    {page === 'track' && <TrackOrder />}
    {page === 'admin' && <AdminOrders />}
  </div>);
}

const express = require('express');
const mongoose = require('mongoose');
const cors = require('cors');
const bcrypt = require('bcryptjs');
const jwt = require('jsonwebtoken');
require('dotenv').config();

const app = express();
app.use(cors());
app.use(express.json());

mongoose.connect(process.env.MONGO_URI || 'mongodb://localhost:27017/examination');

const UserSchema = new mongoose.Schema({
  name: String, email: String, password: String,
  role: { type: String, enum: ['student', 'teacher'], default: 'student' }
});
const User = mongoose.model('User', UserSchema);

const ExamSchema = new mongoose.Schema({
  title: String, description: String, duration: Number,
  createdBy: { type: mongoose.Schema.Types.ObjectId, ref: 'User' },
  questions: [{ question: String, options: [String], correctAnswer: Number, marks: Number }],
  isActive: { type: Boolean, default: true }, createdAt: { type: Date, default: Date.now }
});
const Exam = mongoose.model('Exam', ExamSchema);

const ResultSchema = new mongoose.Schema({
  student: { type: mongoose.Schema.Types.ObjectId, ref: 'User' },
  exam: { type: mongoose.Schema.Types.ObjectId, ref: 'Exam' },
  answers: [Number], score: Number, totalMarks: Number, percentage: Number,
  submittedAt: { type: Date, default: Date.now }
});
const Result = mongoose.model('Result', ResultSchema);

const auth = (req, res, next) => {
  try { req.user = jwt.verify(req.headers.authorization.split(' ')[1], 'secret'); next(); }
  catch(e) { res.status(401).json({ error: 'Unauthorized' }); }
};

app.post('/api/register', async (req, res) => {
  const hash = await bcrypt.hash(req.body.password, 10);
  res.json(await User.create({ ...req.body, password: hash }));
});
app.post('/api/login', async (req, res) => {
  const user = await User.findOne({ email: req.body.email });
  if (!user || !(await bcrypt.compare(req.body.password, user.password))) return res.status(401).json({ error: 'Invalid' });
  res.json({ token: jwt.sign({ id: user._id, role: user.role, name: user.name }, 'secret'), user: { id: user._id, name: user.name, role: user.role } });
});

app.post('/api/exams', auth, async (req, res) => {
  if (req.user.role !== 'teacher') return res.status(403).json({ error: 'Only teachers' });
  res.json(await Exam.create({ ...req.body, createdBy: req.user.id }));
});
app.get('/api/exams', async (req, res) => res.json(await Exam.find({ isActive: true }).select('-questions.correctAnswer')));
app.get('/api/exams/:id', auth, async (req, res) => {
  const exam = await Exam.findById(req.params.id);
  if (req.user.role === 'student') { const e = exam.toObject(); e.questions = e.questions.map(q => ({ ...q, correctAnswer: undefined })); return res.json(e); }
  res.json(exam);
});

app.post('/api/exams/:id/submit', auth, async (req, res) => {
  const exam = await Exam.findById(req.params.id);
  const { answers } = req.body;
  let score = 0, totalMarks = 0;
  exam.questions.forEach((q, i) => { totalMarks += q.marks; if (answers[i] === q.correctAnswer) score += q.marks; });
  const percentage = (score / totalMarks) * 100;
  res.json(await Result.create({ student: req.user.id, exam: exam._id, answers, score, totalMarks, percentage }));
});

app.get('/api/results', auth, async (req, res) => {
  const filter = req.user.role === 'student' ? { student: req.user.id } : {};
  res.json(await Result.find(filter).populate('student exam'));
});

app.listen(5000, () => console.log('Server running on port 5000'));

import React, { useState, useEffect } from 'react';
import axios from 'axios';
const API = 'http://localhost:5000/api';
const getToken = () => ({ headers: { Authorization: \`Bearer \${localStorage.getItem('token')}\` } });

function Auth({ onLogin }) {
  const [isLogin, setIsLogin] = useState(true);
  const [form, setForm] = useState({ name: '', email: '', password: '', role: 'student' });
  const handle = async (e) => {
    e.preventDefault();
    if (isLogin) { const { data } = await axios.post(\`\${API}/login\`, form); localStorage.setItem('token', data.token); onLogin(data.user); }
    else { await axios.post(\`\${API}/register\`, form); setIsLogin(true); alert('Registered!'); }
  };
  return (<form onSubmit={handle}>
    <h2>{isLogin ? 'Login' : 'Register'}</h2>
    {!isLogin && <input placeholder="Name" onChange={e => setForm({...form, name: e.target.value})} />}
    <input placeholder="Email" onChange={e => setForm({...form, email: e.target.value})} />
    <input type="password" placeholder="Password" onChange={e => setForm({...form, password: e.target.value})} />
    {!isLogin && <select onChange={e => setForm({...form, role: e.target.value})}><option value="student">Student</option><option value="teacher">Teacher</option></select>}
    <button type="submit">{isLogin ? 'Login' : 'Register'}</button>
    <button type="button" onClick={() => setIsLogin(!isLogin)}>Switch</button>
  </form>);
}

function CreateExam() {
  const [form, setForm] = useState({ title: '', description: '', duration: 30, questions: [{ question: '', options: ['', '', '', ''], correctAnswer: 0, marks: 1 }] });
  const addQuestion = () => setForm({ ...form, questions: [...form.questions, { question: '', options: ['', '', '', ''], correctAnswer: 0, marks: 1 }] });
  const updateQ = (idx, field, val) => { const qs = [...form.questions]; qs[idx][field] = val; setForm({ ...form, questions: qs }); };
  const updateOption = (qi, oi, val) => { const qs = [...form.questions]; qs[qi].options[oi] = val; setForm({ ...form, questions: qs }); };
  const submit = async (e) => { e.preventDefault(); await axios.post(\`\${API}/exams\`, form, getToken()); alert('Created!'); };
  return (<form onSubmit={submit}>
    <h2>Create Exam</h2>
    <input placeholder="Title" onChange={e => setForm({...form, title: e.target.value})} />
    <input type="number" placeholder="Duration" value={form.duration} onChange={e => setForm({...form, duration: +e.target.value})} />
    {form.questions.map((q, qi) => <div key={qi} style={{border:'1px solid #ccc',padding:8,margin:4}}>
      <input placeholder="Question" value={q.question} onChange={e => updateQ(qi, 'question', e.target.value)} />
      {q.options.map((o, oi) => <input key={oi} placeholder={\`Option \${oi+1}\`} value={o} onChange={e => updateOption(qi, oi, e.target.value)} />)}
      <select value={q.correctAnswer} onChange={e => updateQ(qi, 'correctAnswer', +e.target.value)}>{[0,1,2,3].map(i => <option key={i} value={i}>Correct: {i+1}</option>)}</select>
    </div>)}
    <button type="button" onClick={addQuestion}>+ Question</button>
    <button type="submit">Create</button>
  </form>);
}

function TakeExam() {
  const [exams, setExams] = useState([]);
  const [current, setCurrent] = useState(null);
  const [answers, setAnswers] = useState([]);
  const [result, setResult] = useState(null);
  useEffect(() => { axios.get(\`\${API}/exams\`).then(r => setExams(r.data)); }, []);
  const startExam = async (id) => { const { data } = await axios.get(\`\${API}/exams/\${id}\`, getToken()); setCurrent(data); setAnswers(new Array(data.questions.length).fill(-1)); };
  const submitExam = async () => { const { data } = await axios.post(\`\${API}/exams/\${current._id}/submit\`, { answers }, getToken()); setResult(data); setCurrent(null); };
  if (result) return <div><h2>Result</h2><p>Score: {result.score}/{result.totalMarks} ({result.percentage.toFixed(1)}%)</p><button onClick={() => setResult(null)}>Back</button></div>;
  if (current) return (<div><h2>{current.title}</h2>
    {current.questions.map((q, qi) => <div key={qi} style={{margin:8}}>
      <p><strong>Q{qi+1}: {q.question}</strong></p>
      {q.options.map((o, oi) => <label key={oi} style={{display:'block'}}><input type="radio" name={\`q\${qi}\`} checked={answers[qi]===oi} onChange={() => { const a=[...answers]; a[qi]=oi; setAnswers(a); }} /> {o}</label>)}
    </div>)}
    <button onClick={submitExam}>Submit</button>
  </div>);
  return (<div><h2>Exams</h2>{exams.map(e => <div key={e._id}>{e.title} <button onClick={() => startExam(e._id)}>Start</button></div>)}</div>);
}

function Results() {
  const [results, setResults] = useState([]);
  useEffect(() => { axios.get(\`\${API}/results\`, getToken()).then(r => setResults(r.data)); }, []);
  return (<div><h2>Results</h2>
    <table><thead><tr><th>Exam</th><th>Student</th><th>Score</th><th>%</th></tr></thead>
    <tbody>{results.map(r => <tr key={r._id}><td>{r.exam?.title}</td><td>{r.student?.name}</td><td>{r.score}/{r.totalMarks}</td><td>{r.percentage?.toFixed(1)}%</td></tr>)}</tbody></table>
  </div>);
}

export default function App() {
  const [user, setUser] = useState(null);
  const [page, setPage] = useState('exams');
  if (!user) return <Auth onLogin={setUser} />;
  return (<div>
    <nav>{user.role === 'teacher' && <button onClick={() => setPage('create')}>Create</button>}
    <button onClick={() => setPage('exams')}>Exams</button><button onClick={() => setPage('results')}>Results</button>
    <button onClick={() => { localStorage.removeItem('token'); setUser(null); }}>Logout</button></nav>
    {page === 'create' && <CreateExam />}
    {page === 'exams' && <TakeExam />}
    {page === 'results' && <Results />}
  </div>);
}

}

const express = require('express');
const mongoose = require('mongoose');
const cors = require('cors');
const bcrypt = require('bcryptjs');
const jwt = require('jsonwebtoken');
require('dotenv').config();

const app = express();
app.use(cors());
app.use(express.json());

mongoose.connect(process.env.MONGO_URI || 'mongodb://localhost:27017/hotel');

const UserSchema = new mongoose.Schema({ name: String, email: String, password: String, role: { type: String, enum: ['guest', 'admin'], default: 'guest' } });
const User = mongoose.model('User', UserSchema);

const RoomSchema = new mongoose.Schema({ roomNumber: String, type: { type: String, enum: ['single', 'double', 'suite', 'deluxe'] }, price: Number, maxGuests: Number, isAvailable: { type: Boolean, default: true } });
const Room = mongoose.model('Room', RoomSchema);

const BookingSchema = new mongoose.Schema({
  room: { type: mongoose.Schema.Types.ObjectId, ref: 'Room' }, guest: { type: mongoose.Schema.Types.ObjectId, ref: 'User' },
  checkIn: Date, checkOut: Date, totalAmount: Number, paymentStatus: { type: String, default: 'pending' },
  status: { type: String, default: 'confirmed', enum: ['confirmed', 'checked-in', 'checked-out', 'cancelled'] }, createdAt: { type: Date, default: Date.now }
});
const Booking = mongoose.model('Booking', BookingSchema);

const auth = (req, res, next) => { try { req.user = jwt.verify(req.headers.authorization.split(' ')[1], 'secret'); next(); } catch(e) { res.status(401).json({ error: 'Unauthorized' }); } };

app.post('/api/register', async (req, res) => { const hash = await bcrypt.hash(req.body.password, 10); res.json(await User.create({ ...req.body, password: hash })); });
app.post('/api/login', async (req, res) => {
  const user = await User.findOne({ email: req.body.email });
  if (!user || !(await bcrypt.compare(req.body.password, user.password))) return res.status(401).json({ error: 'Invalid' });
  res.json({ token: jwt.sign({ id: user._id, role: user.role, name: user.name }, 'secret'), user: { id: user._id, name: user.name, role: user.role } });
});

app.get('/api/rooms', async (req, res) => {
  const { checkIn, checkOut, type } = req.query;
  let filter = {}; if (type) filter.type = type;
  let rooms = await Room.find(filter);
  if (checkIn && checkOut) {
    const booked = await Booking.find({ status: { $ne: 'cancelled' }, $or: [{ checkIn: { $lte: new Date(checkOut) }, checkOut: { $gte: new Date(checkIn) } }] }).distinct('room');
    rooms = rooms.filter(r => !booked.some(b => b.equals(r._id)));
  }
  res.json(rooms);
});
app.post('/api/rooms', auth, async (req, res) => res.json(await Room.create(req.body)));

app.post('/api/bookings', auth, async (req, res) => {
  const room = await Room.findById(req.body.room);
  const days = Math.ceil((new Date(req.body.checkOut) - new Date(req.body.checkIn)) / 86400000);
  res.json(await Booking.create({ ...req.body, guest: req.user.id, totalAmount: room.price * days }));
});
app.get('/api/bookings', auth, async (req, res) => {
  const filter = req.user.role === 'guest' ? { guest: req.user.id } : {};
  res.json(await Booking.find(filter).populate('room guest').sort({ createdAt: -1 }));

import React, { useState, useEffect } from 'react';

function Auth({ onLogin }) {

  const handle = async (e) => { e.preventDefault();
    if (isLogin) { const { data } = await axios.post(\`\${API}/login\`, form); localStorage.setItem('token', data.token); onLogin(data.user); }
    else { await axios.post(\`\${API}/register\`, form); setIsLogin(true); }
  };
  return (<form onSubmit={handle}><h2>{isLogin?'Login':'Register'}</h2>
    {!isLogin&&<><input placeholder="Name" onChange={e=>setForm({...form,name:e.target.value})}/><input placeholder="Phone" onChange={e=>setForm({...form,phone:e.target.value})}/><input placeholder="License" onChange={e=>setForm({...form,license:e.target.value})}/></>}
    <input placeholder="Email" onChange={e=>setForm({...form,email:e.target.value})}/>
    <input type="password" placeholder="Password" onChange={e=>setForm({...form,password:e.target.value})}/>
    <button type="submit">{isLogin?'Login':'Register'}</button><button type="button" onClick={()=>setIsLogin(!isLogin)}>Switch</button>
  </form>);
}

function VehicleSearch() {
  const [vehicles, setVehicles] = useState([]); const [dates, setDates] = useState({ startDate: '', endDate: '' }); const [type, setType] = useState('');

function MyRentals() {

  const ret = async (id) => { await axios.put(\`\${API}/rentals/\${id}/return\`, {}, getToken()); g(); };
  return (<div><h2>Rentals</h2>

function SeatSelection({ movie, onBack }) {
  const [showIdx, setShowIdx] = useState(0);
  const [seats, setSeats] = useState([]); const [sel, setSel] = useState([]); const [info, setInfo] = useState({});
  useEffect(() => { if (movie.shows?.length) load(0); }, []);
  const load = async (i) => { setShowIdx(i); setSel([]); const { data } = await axios.get(\`\${API}/movies/\${movie._id}/shows/\${i}/seats\`); setSeats(data.seats); setInfo(data); };
  const toggle = (id) => setSel(p => p.includes(id) ? p.filter(s=>s!==id) : [...p, id]);
  const book = async () => { if (!sel.length) return alert('Select seats'); await axios.post(\`\${API}/bookings\`, { movieId: movie._id, showIndex: showIdx, seats: sel }, getToken()); alert('Booked!'); onBack(); };

    {!isLogin&&<><input placeholder="Name" onChange={e=>setForm({...form,name:e.target.value})}/><input placeholder="Student ID" onChange={e=>setForm({...form,studentId:e.target.value})}/><input placeholder="Department" onChange={e=>setForm({...form,department:e.target.value})}/>
    <select onChange={e=>setForm({...form,role:e.target.value})}><option value="student">Student</option><option value="organizer">Organizer</option><option value="admin">Admin</option></select></>}
    <input placeholder="Email" onChange={e=>setForm({...form,email:e.target.value})}/><input type="password" placeholder="Password" onChange={e=>setForm({...form,password:e.target.value})}/>
    <button type="submit">{isLogin?'Login':'Register'}</button><button type="button" onClick={()=>setIsLogin(!isLogin)}>Switch</button>
  </form>);
}

function EventList({ user }) {
  const [events, setEvents] = useState([]); const [cat, setCat] = useState('');
  useEffect(() => { axios.get(\`\${API}/events\${cat?'?category='+cat:''}\`).then(r => setEvents(r.data)); }, [cat]);
  const reg = async (id) => { await axios.post(\`\${API}/events/\${id}/register\`, {}, getToken()); alert('Registered!'); };
  const unreg = async (id) => { await axios.post(\`\${API}/events/\${id}/unregister\`, {}, getToken()); alert('Unregistered!'); };
  return (<div><h2>Events</h2>
    <select value={cat} onChange={e=>setCat(e.target.value)}><option value="">All</option><option>Technical</option><option>Cultural</option><option>Sports</option><option>Workshop</option></select>
    {events.map(e=><div key={e._id} style={{border:'1px solid #ccc',padding:8,margin:4}}><h3>{e.title}</h3><p>{e.category} | {new Date(e.date).toLocaleDateString()} {e.time} | {e.venue}</p>
    <p>{e.participants?.length||0}/{e.maxParticipants} | {e.status}</p>
    {user.role==='student'&&<><button onClick={()=>reg(e._id)}>Register</button><button onClick={()=>unreg(e._id)}>Unregister</button></>}</div>)}</div>);
}

function CreateEvent() {
  const [form, setForm] = useState({ title: '', description: '', category: 'Technical', date: '', time: '', venue: '', maxParticipants: 50 });
  const submit = async (e) => { e.preventDefault(); await axios.post(\`\${API}/events\`, form, getToken()); alert('Created!'); };
  return (<form onSubmit={submit}><h2>Create Event</h2>
    <input placeholder="Title" onChange={e=>setForm({...form,title:e.target.value})}/>
    <textarea placeholder="Description" onChange={e=>setForm({...form,description:e.target.value})}></textarea>
    <select onChange={e=>setForm({...form,category:e.target.value})}><option>Technical</option><option>Cultural</option><option>Sports</option><option>Workshop</option></select>
    <input type="date" onChange={e=>setForm({...form,date:e.target.value})}/><input type="time" onChange={e=>setForm({...form,time:e.target.value})}/>
    <input placeholder="Venue" onChange={e=>setForm({...form,venue:e.target.value})}/>
    <input type="number" placeholder="Max" value={form.maxParticipants} onChange={e=>setForm({...form,maxParticipants:+e.target.value})}/>
    <button type="submit">Create</button>
  </form>);
}

function ManageParticipants() {
  const [events, setEvents] = useState([]); const [sel, setSel] = useState(null); const [att, setAtt] = useState([]);
  useEffect(() => { axios.get(\`\${API}/events\`).then(r => setEvents(r.data)); }, []);
  const view = async (id) => { setSel(id); const { data } = await axios.get(\`\${API}/events/\${id}/attendance\`, getToken()); setAtt(data); };
  const checkIn = async (id) => { await axios.put(\`\${API}/attendance/\${id}/checkin\`, {}, getToken()); view(sel); };
  return (<div><h2>Manage</h2>
    {!sel ? events.map(e=><div key={e._id}>{e.title} ({e.participants?.length||0}) <button onClick={()=>view(e._id)}>View</button></div>)
    : <div><button onClick={()=>setSel(null)}>Back</button>
      <table><thead><tr><th>Name</th><th>Email</th><th>Checked In</th><th>Action</th></tr></thead>
      <tbody>{att.map(a=><tr key={a._id}><td>{a.student?.name}</td><td>{a.student?.email}</td><td>{a.checkedIn?'Yes':'No'}</td>
      <td>{!a.checkedIn&&<button onClick={()=>checkIn(a._id)}>Check In</button>}</td></tr>)}</tbody></table></div>}
  </div>);
}

function Schedule() {
  const [events, setEvents] = useState([]);
  useEffect(() => { axios.get(\`\${API}/schedule\`).then(r => setEvents(r.data)); }, []);
  return (<div><h2>Schedule</h2>
    <table><thead><tr><th>Event</th><th>Date</th><th>Time</th><th>Venue</th><th>Status</th></tr></thead>
    <tbody>{events.map(e=><tr key={e._id}><td>{e.title}</td><td>{new Date(e.date).toLocaleDateString()}</td><td>{e.time}</td><td>{e.venue}</td><td>{e.status}</td></tr>)}</tbody></table>
  </div>);
}

function MyEvents() {
  const [events, setEvents] = useState([]);
  useEffect(() => { axios.get(\`\${API}/my-events\`, getToken()).then(r => setEvents(r.data)); }, []);
  return (<div><h2>My Events</h2>{events.map(e=><div key={e._id} style={{border:'1px solid #ccc',padding:8,margin:4}}><h3>{e.title}</h3><p>{new Date(e.date).toLocaleDateString()} {e.time} | {e.venue}</p></div>)}</div>);
}

export default function App() {
  const [user, setUser] = useState(null); const [page, setPage] = useState('events');
  if (!user) return <Auth onLogin={setUser} />;
  return (<div><nav><button onClick={()=>setPage('events')}>Events</button><button onClick={()=>setPage('schedule')}>Schedule</button>
    {user.role==='student'&&<button onClick={()=>setPage('my')}>My Events</button>}
    {['organizer','admin'].includes(user.role)&&<><button onClick={()=>setPage('create')}>Create</button><button onClick={()=>setPage('manage')}>Manage</button></>}
    <button onClick={()=>{localStorage.removeItem('token');setUser(null)}}>Logout</button></nav>
    {page==='events'&&<EventList user={user}/>}{page==='schedule'&&<Schedule/>}{page==='create'&&<CreateEvent/>}
    {page==='manage'&&<ManageParticipants/>}{page==='my'&&<MyEvents/>}
  </div>);
}

function copyAll(btn) {
  navigator.clipboard.writeText(ALL).then(function() {
    btn.classList.add('copied');
    btn.textContent = 'Copied!';
    setTimeout(function() { btn.classList.remove('copied'); btn.textContent = 'Copy'; }, 2000);
  });
}
